architecture: bilstm
run_name: bilstm_aquatic_mammals_40ep
seed: 42

view: sequence
activation: tanh
use_masking: false
hidden_units: 64
dropout: 0.3

task:
  type: binary
  label_level: coarse
  positive_label_names:
    - aquatic_mammals

validation:
  fraction: 0.1
  stratify: true

class_imbalance:
  strategy: class_weights

batch_size: 128
shuffle_buffer: 4096

epochs: 40
optimizer: adam
learning_rate: 1e-3
gradient_clipnorm: 1.0
early_stopping:
  monitor: val_loss
  patience: 5

output_dir: results/sequence/bilstm/binary/coarse/aquatic_mammals
save_weights: true
subset_size: null
